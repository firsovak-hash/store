{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-sign-in-alt"></i>
            <h2>Вход в аккаунт</h2>
            <p>Войдите, чтобы оформить заказ</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Войти</button>
        </form>
        
        <div class="auth-footer">
            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }
    
    .auth-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .auth-header i {
        font-size: 48px;
        color: #ff9f43;
        margin-bottom: 16px;
    }
    
    .auth-header h2 {
        font-size: 28px;
        margin-bottom: 8px;
    }
    
    .auth-header p {
        color: rgba(255, 255, 255, 0.5);
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
    }
    
    .form-group input {
        width: 100%;
        padding: 14px 18px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        color: #fff;
        font-size: 16px;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #ff6b6b;
    }
    
    .auth-btn {
        width: 100%;
        justify-content: center;
        margin-top: 8px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        color: rgba(255, 255, 255, 0.6);
    }
    
    .auth-footer a {
        color: #ff9f43;
        text-decoration: none;
    }
</style>
{% endblock %}
