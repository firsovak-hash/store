<div class="products-grid">
    {% for product in products[:6] %}
    <div class="product-card">
        <div class="product-card-image" onclick="openModal('{{ product.id }}')">
            {% if product.id == '4' %}
                <img src="/static/images/IMG_8756-removebg-preview.png" alt="{{ product.name }}" class="product-image-sticker">
            {% else %}
                <i class="fas fa-cube"></i>
            {% endif %}
        </div>
        <div class="product-card-info">
            <h3>{{ product.name }}</h3>
            <p class="product-card-price">{{ product.price }} ₽</p>
            <button class="card-order-btn" onclick="orderInTelegram('{{ product.name }}')">
                <i class="fab fa-telegram"></i> Заказать
            </button>
        </div>
    </div>
    {% endfor %}
</div>
