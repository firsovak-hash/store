<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Figurki — {% block title %}персонализированные 3D-фигурки{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Swiper для карусели -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(245, 224, 232, 0.92) 0%, rgba(197, 213, 232, 0.92) 100%);
            color: #1a1a2e;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            text-decoration: none;
        }

        .logo span {
            color: #d66b7e;
        }

        .nav-order-btn {
            background: #d66b7e;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-order-btn:hover {
            background: #c05a6d;
            transform: translateY(-2px);
        }

        .burger {
            display: none;
            width: 44px;
            height: 44px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            cursor: pointer;
        }

        .burger-line {
            width: 22px;
            height: 2px;
            background: #1a1a2e;
            border-radius: 2px;
            transition: 0.2s;
        }

        .mobile-menu {
            position: fixed;
            top: 80px;
            left: -100%;
            bottom: 0;
            width: 100%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            transition: left 0.3s ease;
            z-index: 999;
            padding: 24px;
            overflow-y: auto;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .mobile-menu .menu-link i {
            width: 24px;
            color: #d66b7e;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .main-content {
            padding-top: 90px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #d66b7e;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #c05a6d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 16px 24px;
            }
            .nav-order-btn span {
                display: none;
            }
            .nav-order-btn {
                padding: 10px 16px;
            }
            .burger {
                display: flex;
            }
            .container {
                padding: 0 20px;
            }
            .main-content {
                padding-top: 80px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <a href="{{ url_for('index') }}" class="logo">3D<span>Figurki</span></a>
    <a href="https://t.me/your_username" target="_blank" class="nav-order-btn">
        <i class="fab fa-telegram"></i> <span>Заказать в Telegram</span>
    </a>
    <div class="burger" id="burger">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="{{ url_for('index') }}" class="menu-link" onclick="closeMenu()"><i class="fas fa-home"></i> Главная</a>
    <a href="{{ url_for('catalog') }}" class="menu-link" onclick="closeMenu()"><i class="fas fa-store"></i> Каталог</a>
    <a href="#" class="menu-link" onclick="closeMenu()"><i class="fas fa-heart"></i> О нас</a>
    <a href="#" class="menu-link" onclick="closeMenu()"><i class="fas fa-star"></i> Отзывы</a>
    <div class="social-links" style="margin-top: 24px;">
        <a href="#" style="color: #d66b7e; margin-right: 16px;"><i class="fab fa-telegram"></i></a>
        <a href="#" style="color: #d66b7e; margin-right: 16px;"><i class="fab fa-tiktok"></i></a>
        <a href="#" style="color: #d66b7e; margin-right: 16px;"><i class="fab fa-instagram"></i></a>
        <a href="#" style="color: #d66b7e;"><i class="fab fa-vk"></i></a>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('burger').classList.toggle('active');
    }
    function closeMenu() {
        document.getElementById('mobileMenu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('burger').classList.remove('active');
    }
    document.getElementById('burger').addEventListener('click', toggleMenu);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
