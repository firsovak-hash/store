<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Figurki — {% block title %}персонализированные 3D-фигурки{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 30%, #ffb88c 70%, #a8ede0 100%);
            color: #1a1a2e;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            text-decoration: none;
        }

        .logo span {
            color: #d66b7e;
        }

        /* Бургер-кнопка */
        .burger {
            display: none;
            width: 44px;
            height: 44px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            cursor: pointer;
            z-index: 1001;
        }

        .burger-line {
            width: 22px;
            height: 2px;
            background: #1a1a2e;
            border-radius: 2px;
            transition: 0.2s;
        }

        .burger.active .burger-line:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .burger.active .burger-line:nth-child(2) {
            opacity: 0;
        }
        .burger.active .burger-line:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* Мобильное меню */
        .mobile-menu {
            position: fixed;
            top: 80px;
            left: -100%;
            bottom: 0;
            width: 100%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            transition: left 0.3s ease;
            z-index: 999;
            padding: 24px;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .mobile-menu.active {
            left: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .menu-link i {
            width: 24px;
            color: #d66b7e;
        }

        .social-links {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(214, 107, 126, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d66b7e;
            text-decoration: none;
            transition: 0.2s;
        }

        .social-link:hover {
            background: #d66b7e;
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .main-content {
            padding-top: 90px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #d66b7e;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #c05a6d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 16px 24px;
            }
            .burger {
                display: flex;
            }
            .container {
                padding: 0 20px;
            }
            .main-content {
                padding-top: 80px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <a href="{{ url_for('index') }}" class="logo">3D<span>Figurki</span></a>
    <div class="burger" id="burger">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="{{ url_for('index') }}" class="menu-link" onclick="closeMenu()"><i class="fas fa-home"></i> Главная</a>
    <a href="{{ url_for('catalog') }}" class="menu-link" onclick="closeMenu()"><i class="fas fa-store"></i> Каталог</a>
    <div class="social-links">
        <a href="https://t.me/your_username" target="_blank" class="social-link"><i class="fab fa-telegram"></i></a>
        <a href="https://www.tiktok.com/@your_username" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>
        <a href="https://instagram.com/your_username" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
        <a href="https://vk.com/your_username" target="_blank" class="social-link"><i class="fab fa-vk"></i></a>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    const burger = document.getElementById('burger');
    const menu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        menu.classList.toggle('active');
        overlay.classList.toggle('active');
        burger.classList.toggle('active');
    }

    function closeMenu() {
        menu.classList.remove('active');
        overlay.classList.remove('active');
        burger.classList.remove('active');
    }

    burger.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', closeMenu);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
