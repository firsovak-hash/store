{% extends "base.html" %}

{% block title %}Каталог{% endblock %}

{% block content %}
<h1 style="text-align: center; margin-bottom: 40px;">Каталог фигурок</h1>

<div class="catalog-grid">
    {% for product in products %}
    <div class="catalog-card" onclick="window.location.href='/product/{{ product.id }}'">
        <div class="card-image">
            <i class="fas fa-cube"></i>
        </div>
        <div class="card-info">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description[:80] }}...</p>
            <div class="price">{{ product.price }} ₽</div>
            <button class="card-btn">Подробнее</button>
        </div>
    </div>
    {% endfor %}
</div>

<style>
    .catalog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
        padding: 20px 0;
    }
    .catalog-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .catalog-card:hover {
        transform: translateY(-5px);
        background: white;
    }
    .card-image {
        height: 220px;
        background: rgba(216, 107, 126, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .card-image i {
        font-size: 64px;
        color: #d66b7e;
    }
    .card-info {
        padding: 20px;
    }
    .card-info h3 {
        margin-bottom: 8px;
    }
    .price {
        font-size: 24px;
        font-weight: 700;
        color: #d66b7e;
        margin: 12px 0;
    }
    .card-btn {
        background: #d66b7e;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
    }
    .card-btn:hover {
        background: #c05a6d;
    }
</style>
{% endblock %}
