{% extends "base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<div class="product-page">
    <div class="product-grid">
        <div class="product-gallery">
            <div class="main-image">
                <i class="fas fa-cube"></i>
            </div>
        </div>
        <div class="product-info">
            <h1>{{ product.name }}</h1>
            <div class="product-price">{{ product.price }} ₽</div>
            <p class="product-description">{{ product.description }}</p>
            <div class="product-features-list">
                <h3>Характеристики:</h3>
                <ul>
                    {% for feature in product.features %}
                        <li>{{ feature }}</li>
                    {% endfor %}
                </ul>
            </div>
            <a href="https://t.me/your_username" target="_blank" class="btn-primary order-btn">
                <i class="fab fa-telegram"></i> Заказать в Telegram
            </a>
        </div>
    </div>
</div>

<style>
    .product-page {
        padding: 40px 0;
    }
    .product-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        background: white;
        border-radius: 32px;
        padding: 40px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    .main-image {
        background: #f8f0f2;
        border-radius: 24px;
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .main-image i {
        font-size: 120px;
        color: #d66b7e;
    }
    .product-info h1 {
        font-size: 36px;
        font-weight: 800;
        color: #1a1a2e;
        margin-bottom: 16px;
    }
    .product-price {
        font-size: 32px;
        font-weight: 700;
        color: #d66b7e;
        margin-bottom: 24px;
    }
    .product-description {
        color: #4a4a5a;
        line-height: 1.6;
        margin-bottom: 32px;
    }
    .product-features-list h3 {
        font-size: 18px;
        margin-bottom: 12px;
        color: #1a1a2e;
    }
    .product-features-list ul {
        list-style: none;
        padding: 0;
    }
    .product-features-list li {
        padding: 8px 0;
        color: #4a4a5a;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .product-features-list li::before {
        content: "✓";
        color: #d66b7e;
        font-weight: bold;
    }
    .order-btn {
        margin-top: 32px;
        width: 100%;
        justify-content: center;
    }
    @media (max-width: 768px) {
        .product-grid {
            grid-template-columns: 1fr;
            padding: 24px;
        }
        .main-image {
            height: 250px;
        }
        .product-info h1 {
            font-size: 28px;
        }
    }
</style>
{% endblock %}
